<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية ويزي | منصة الاكتساح السيادي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f59e0b; --bg: #020617; --card-bg: rgba(30, 41, 59, 0.7); }
        body { background: var(--bg); color: #f8fafc; font-family: 'Cairo', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .navbar-wizzy { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border-bottom: 3px solid var(--gold); padding: 15px 0; sticky: top; z-index: 1000; }
        .hero { padding: 50px 0; text-align: center; background: radial-gradient(circle at center, #1e293b 0%, #020617 100%); }
        
        /* شريط البحث والتبويبات */
        .search-area { max-width: 800px; margin: -40px auto 30px; position: relative; z-index: 100; }
        .search-area input { width: 100%; padding: 18px 60px; border-radius: 30px; border: 3px solid var(--gold); background: #0f172a; color: white; font-size: 1.1rem; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .search-area i { position: absolute; right: 25px; top: 22px; color: var(--gold); font-size: 1.3rem; }
        
        .nav-tabs-custom { border: none; justify-content: center; margin-bottom: 40px; }
        .nav-tabs-custom .nav-link { color: #94a3b8; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); margin: 5px; border-radius: 15px; padding: 10px 25px; transition: 0.3s; }
        .nav-tabs-custom .nav-link.active { background: var(--gold); color: #000; border-color: var(--gold); }

        /* الكروت */
        .content-card { background: var(--card-bg); border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; overflow: hidden; height: 100%; cursor: pointer; }
        .content-card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 15px 40px rgba(245, 158, 11, 0.3); }
        
        /* المشغل */
        #video-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #020617; z-index: 2000; padding: 20px; overflow-y: auto; }
        .video-item { background: #0f172a; border-radius: 20px; padding: 15px; border: 1px solid var(--gold); margin-bottom: 25px; text-align: center; }
        .video-frame { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; }
        .video-frame iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .btn-download { background: var(--gold); color: #000; font-weight: 900; border-radius: 12px; padding: 10px; border: none; margin-top: 15px; width: 100%; }

        /* العدادات */
        .stats-bar { background: #070b14; border-top: 2px solid var(--gold); padding: 12px 0; font-size: 0.85rem; position: fixed; bottom: 0; width: 100%; z-index: 1500; font-weight: 900; }
        .stat-badge { background: rgba(245, 158, 11, 0.1); color: var(--gold); padding: 5px 15px; border-radius: 50px; border: 1px solid rgba(245, 158, 11, 0.3); margin: 0 8px; }
        footer { border-top: 1px solid rgba(255,255,255,0.05); margin-bottom: 80px; padding: 50px 0; text-align: center; }
    </style>
</head>
<body>

    <nav class="navbar-wizzy">
        <div class="container text-center"><h2 class="fw-black mb-0 text-warning"><i class="fas fa-crown"></i> إمبراطورية ويزي التعليمية</h2></div>
    </nav>

    <div id="main-view">
        <header class="hero">
            <h1 class="display-4 fw-black text-white">منصة الاكتساح السيادي 🚀</h1>
            <p class="text-secondary lead fw-bold">الأرشيف القومي الشامل لطلاب السودان</p>
        </header>

        <div class="container search-area">
            <i class="fas fa-search"></i>
            <input type="text" id="wizzy-search" placeholder="ابحث عن مادة، أستاذ، أو تخصص جامعي..." onkeyup="filter()">
        </div>

        <div class="container mb-5">
            <nav class="nav nav-tabs-custom">
                <button class="nav-link active" onclick="switchTab('ثانوي', this)">🎓 الشهادة السودانية</button>
                <button class="nav-link" onclick="switchTab('جامعة', this)">🏛️ المستوى الجامعي</button>
            </nav>
            <div class="row g-4" id="grid"></div>
        </div>
    </div>

    <div id="video-overlay">
        <div class="container">
            <button onclick="closeOverlay()" class="btn btn-outline-warning mb-4"><i class="fas fa-arrow-right"></i> العودة للقائمة</button>
            <h2 id="view-title" class="text-white fw-black mb-5 text-center"></h2>
            <div class="row g-4" id="v-list"></div>
        </div>
    </div>

    <div class="stats-bar text-center">
        <div class="container d-flex justify-content-center flex-wrap">
            <span class="stat-badge"><i class="fas fa-history"></i> Uptime: <span id="uptime">0د 0ث</span></span>
            <span class="stat-badge"><i class="fas fa-users"></i> نشط الآن: <span id="online">...</span></span>
            <span class="stat-badge"><i class="fas fa-shield-alt"></i> النطاق: السودان 🇸🇩</span>
        </div>
    </div>

    <footer>
        <h4 class="fw-black text-white mb-3">جميع الحقوق محفوظة © 2026 - محمد عادل (ويزي) ❤️</h4>
        <p class="text-secondary small px-3">بصمة تعليمية سيادية - دعواتكم لمحمد عادل في مسيرته الجامعية.</p>
        <a href="https://api.whatsapp.com/send?phone=249967185716" class="btn btn-success fw-bold mt-2" target="_blank"><i class="fab fa-whatsapp"></i> تواصل مع ويزي</a>
    </footer>

    <script>
        const data = [
            // قسم الثانوي
            { id: "math", name: "الرياضيات", cat: "ثانوي", icon: "fa-calculator", vids: [{t: "التركيز 1", id: "3rr4QNt1E14"}, {t: "التركيز 2", id: "ki3hsK9ikcQ"}] },
            { id: "phys", name: "الفيزياء", cat: "ثانوي", icon: "fa-bolt", vids: [{t: "الحركة الدائرية", id: "S-tz7_wGi3U"}] },
            { id: "chem", name: "الكيمياء", cat: "ثانوي", icon: "fa-vial", vids: [{t: "العضوية", id: "xTCgZxVI37E"}] },
            { id: "geo", name: "الجغرافيا", cat: "ثانوي", icon: "fa-earth-africa", vids: [{t: "مراجعة شاملة", id: "4LqgmRktsPg"}] },
            { id: "arab", name: "العربية", cat: "ثانوي", icon: "fa-book", vids: [{t: "النحو", id: "UYEsJq3Bkho"}] },
            
            // قسم الجامعة
            { id: "cs", name: "علوم الحاسوب", cat: "جامعة", icon: "fa-code", vids: [{t: "بايثون", id: "SBd1ONQXlos"}, {t: "هياكل البيانات", id: "LZNxsDf2JBo"}] },
            { id: "eng", name: "الهندسة", cat: "جامعة", icon: "fa-gears", vids: [{t: "الدوائر", id: "3rr4QNt1E14"}] },
            { id: "med", name: "الطب", cat: "جامعة", icon: "fa-stethoscope", vids: [{t: "التشريح", id: "yRIHm1iwTFs"}] }
        ];

        let activeTab = 'ثانوي';

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = data.filter(d => d.cat === activeTab).map(d => `
                <div class="col-md-6 col-lg-4 card-box" data-search="${d.name}">
                    <div class="content-card p-4 text-center" onclick="openSub('${d.id}')">
                        <div style="font-size: 2.5rem; color: var(--gold); margin-bottom: 15px;"><i class="fas ${d.icon}"></i></div>
                        <h4 class="fw-bold mb-1">${d.name}</h4>
                        <p class="text-secondary small mb-0">اضغط لاستعراض المئات</p>
                    </div>
                </div>
            `).join('');
        }

        function switchTab(tab, btn) {
            activeTab = tab;
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function filter() {
            let val = document.getElementById('wizzy-search').value.toLowerCase();
            document.querySelectorAll('.card-box').forEach(el => {
                el.style.display = el.getAttribute('data-search').toLowerCase().includes(val) ? 'block' : 'none';
            });
        }

        function openSub(id) {
            const item = data.find(x => x.id === id);
            document.getElementById('view-title').innerText = "🎬 " + item.name;
            document.getElementById('v-list').innerHTML = item.vids.map(v => `
                <div class="col-lg-6"><div class="video-item shadow-lg">
                    <h5 class="text-warning fw-bold mb-3"><i class="fas fa-play"></i> ${v.t}</h5>
                    <div class="video-frame"><iframe src="https://www.youtube.com/embed/${v.id}"></iframe></div>
                    <button onclick="dl('${v.id}')" class="btn-download"><i class="fas fa-download"></i> اقتناء الحصة MP4</button>
                </div></div>
            `).join('');
            document.getElementById('video-overlay').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function dl(id) { window.open(`https://api.ytconvert.org/api/download?url=https://www.youtube.com/watch?v=${id}`, '_blank'); }
        function closeOverlay() { document.getElementById('video-overlay').style.display = 'none'; document.body.style.overflow = 'auto'; }

        let start = Date.now();
        setInterval(() => {
            let diff = Math.floor((Date.now() - start) / 1000);
            document.getElementById('uptime').innerText = Math.floor(diff/60) + "د " + (diff%60) + "ث";
            document.getElementById('online').innerText = Math.floor(Math.random() * (32 - 14) + 14);
        }, 1000);

        render();
    </script>
</body>
</html>
