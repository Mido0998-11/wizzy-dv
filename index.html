        /* محرك البحث الهجين */

        .nav-tabs-custom { border: none; justify-content: center; margin-bottom: 40px; }

        .nav-tabs-custom .nav-link.active { background: var(--gold); color: #000; border-color: var(--gold); }

        .content-card { background: var(--card-bg); border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; overflow: hidden; height: 100%; cursor: pointer; }
        .content-card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 15px 40px rgba(245, 158, 11, 0.3); }
        
        #video-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #020617; z-index: 2000; padding: 20px; overflow-y: auto; }
        .video-item { background: #0f172a; border-radius: 20px; padding: 15px; border: 1px solid var(--gold); margin-bottom: 25px; text-align: center; }
        .video-frame { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; margin-bottom: 15px;}
        .video-frame iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .btn-download { background: var(--gold); color: #000; font-weight: 900; border-radius: 12px; padding: 10px; border: none; width: 100%; cursor: pointer; transition: 0.3s;}
        .btn-download:hover { background: #d97706; color: white;}

        .stat-badge { background: rgba(245, 158, 11, 0.1); color: var(--gold); padding: 5px 15px; border-radius: 50px; border: 1px solid rgba(245, 158, 11, 0.3); margin: 0 8px; display: inline-flex; align-items: center; gap: 5px;}

        let activeTab = 'ثانوي';

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = data.filter(d => d.cat === activeTab).map(d => `
                <div class="col-md-6 col-lg-4 card-box" data-search="${d.name} ${d.prof}">
                    <div class="content-card p-4 text-center" onclick="openSub('${d.id}')">
                        <div style="font-size: 3rem; color: var(--gold); margin-bottom: 15px;"><i class="fas ${d.icon}"></i></div>
                        <h4 class="fw-bold mb-2">${d.name}</h4>
                        <p class="text-secondary small mb-0">تقديم/تخصص: ${d.prof}</p>
                        <span class="badge ${d.cat === 'جامعة' ? 'bg-primary' : 'bg-warning text-dark'} mt-3">${d.vids.length} محاضرات جاهزة</span>
                    </div>
                </div>
            `).join('');
        }

        function switchTab(tab, btn) {
            activeTab = tab;
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            btn.classList.add('active');
            render();
            document.getElementById('wizzy-search').value = '';
            filter();
        }

        // محرك البحث الهجين
        function filter() {
            let val = document.getElementById('wizzy-search').value.toLowerCase();
            let cards = document.querySelectorAll('.card-box');
            let found = false;

            cards.forEach(el => {
                if(el.getAttribute('data-search').toLowerCase().includes(val)) {
                    el.style.display = 'block';
                    found = true;
                } else {
                    el.style.display = 'none';
                }
            });

            // لو ما لقى نتيجة في الموقع، يظهر زرار البحث في يوتيوب
            const ytBtn = document.getElementById('youtube-fallback-btn');
            if (!found && val.length > 2) {
                ytBtn.style.display = 'block';
                ytBtn.innerHTML = `<i class="fab fa-youtube"></i> اضغط للبحث عن "${val}" في يوتيوب مباشرة`;
            } else {
                ytBtn.style.display = 'none';
            }
        }

        // دالة البحث المباشر في يوتيوب (البديل القوي للـ API)
        function searchYouTubeDirectly() {
            let query = document.getElementById('wizzy-search').value;
            let finalQuery = query + (activeTab === 'ثانوي' ? ' شهادة سودانية' : ' كورس جامعة');
            window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(finalQuery)}`, '_blank');
        }

        function openSub(id) {
            const item = data.find(x => x.id === id);
            document.getElementById('view-title').innerText = "🎬 " + item.name;
            document.getElementById('v-list').innerHTML = item.vids.map(v => `
                <div class="col-lg-6"><div class="video-item shadow-lg">
                    <h5 class="text-warning fw-bold mb-3"><i class="fas fa-play"></i> ${v.t}</h5>
                    <div class="video-frame"><iframe src="https://www.youtube.com/embed/${v.id}"></iframe></div>
                    <button onclick="dl('${v.id}')" class="btn-download"><i class="fas fa-download"></i> اقتناء الحصة للتحميل</button>
                </div></div>
            `).join('');
            document.getElementById('video-overlay').style.display = 'block';
            document.body.style.overflow = 'hidden';
            window.scrollTo(0,0);
        }

        function dl(id) { 
            window.open(`https://9xbud.com/https://www.youtube.com/watch?v=${id}`, '_blank'); 
        }
        
        function closeOverlay() { 
            document.getElementById('video-overlay').style.display = 'none'; 
            document.body.style.overflow = 'auto'; 
        }

        let start = Date.now();
        setInterval(() => {
            let diff = Math.floor((Date.now() - start) / 1000);
            document.getElementById('uptime').innerText = Math.floor(diff/60) + "د " + (diff%60) + "ث";
        }, 1000);

        render();
    </script>
</body>
