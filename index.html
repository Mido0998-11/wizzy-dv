<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية ويزي - V88</title>
    <style>
        :root {
            --neon: #00f2ff;
            --green: #39ff14;
            --dark: #0a0f14;
        }

        body {
            background: var(--dark);
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: rgba(23, 33, 43, 0.98);
            padding: 30px 20px;
            border-radius: 20px;
            border: 1px solid var(--neon);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            text-align: center;
            width: 85%;
            max-width: 380px;
        }

        h1 {
            color: var(--neon);
            font-size: 24px;
            text-shadow: 0 0 10px var(--neon);
            margin: 10px 0;
        }

        .crown { font-size: 45px; margin-bottom: 5px; display: block; }

        input {
            width: 100%;
            padding: 15px;
            background: #121922;
            border: 1px solid var(--neon);
            border-radius: 12px;
            color: white;
            font-size: 18px;
            text-align: center;
            margin: 20px 0;
            outline: none;
            box-sizing: border-box;
        }

        /* تحسين استجابة الكتابة */
        input:focus { border-color: white; box-shadow: 0 0 10px var(--neon); }

        .btn-send {
            background: transparent;
            color: var(--green);
            border: 2px solid var(--green);
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
            transition: 0.2s;
        }

        .btn-send:active { transform: scale(0.95); background: var(--green); color: black; }

        .footer {
            margin-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }

        .dev-name {
            color: #ff00ff;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            display: block;
            /* حركة خفيفة للاسم لا ترهق المعالج */
            animation: moveText 8s linear infinite;
        }

        @keyframes moveText {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .wa-link {
            color: var(--green);
            text-decoration: none;
            font-size: 12px;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <span class="crown">👑</span>
    <h1>إمبراطورية ويزي</h1>
    
    <input type="tel" id="phone" placeholder="+249..." autocomplete="off">
    
    <button class="btn-send" onclick="send()">إرسال الطلب الملكي ✅</button>

    <div class="footer">
        <div class="dev-name">꧁ Ｍｏｈａｍｍｅｄ ａｄｅｌ | Ｗｉｚｚｙ ꧂</div>
        <a href="https://wa.me/249128749239" class="wa-link">اتصل بالمطور ⚡</a>
    </div>
</div>

<script>
    function send() {
        const num = document.getElementById('phone').value.trim();
        if(num.length < 9) { alert("أدخل الرقم أولاً يا بطل!"); return; }

        const email = "support@support.whatsapp.com";
        const sub = "WhatsApp Login Problem Report";
        
        // الرسالة الطويلة حقتك (تم تحسينها عشان ما تفشل)
        const body = `Hello WhatsApp Support,

I am contacting you to report an issue I am facing after the latest WhatsApp update. When I try to log in to my WhatsApp account, I receive a message saying that login is currently unavailable for security reasons. We cannot allow you to log in at this time.

Please help resolve this issue and help me regain access to my account.

My Phone Number: ${num}`;

        // استخدام encodeURIComponent لضمان عدم فشل الرابط
        const mailto = "mailto:" + email + "?subject=" + encodeURIComponent(sub) + "&body=" + encodeURIComponent(body);
        
        // محاولة الفتح
        window.location.href = mailto;
    }
</script>

</body>
</html>
